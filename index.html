<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chess Analyzer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#dde1ec;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:22px 14px 56px}

/* ── Header ── */
.app-header{text-align:center;margin-bottom:22px}
.app-header h1{font-size:1.85rem;font-weight:800;letter-spacing:3px;background:linear-gradient(135deg,#f0c060,#e07040);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.app-header p{font-size:.7rem;color:#555;letter-spacing:3px;text-transform:uppercase;margin-top:3px}

/* ── Layout ── */
.layout{display:flex;gap:22px;align-items:flex-start;width:100%;max-width:960px}
@media(max-width:720px){.layout{flex-direction:column;align-items:center}}
.board-col{display:flex;flex-direction:column;gap:10px}

/* ── Board ── */
#board-wrap{position:relative;width:480px;height:480px;border:2px solid #2a2d3a;border-radius:6px;overflow:hidden;box-shadow:0 8px 40px #0009}
@media(max-width:540px){#board-wrap{width:320px;height:320px}}
#board{width:100%;height:100%}
#arrow-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:10}

/* ── Status row ── */
.status-row{display:flex;align-items:center;justify-content:space-between;font-size:.82rem;color:#888;padding:0 2px}
.status-row strong{color:#f0c060}
.thinking-label{font-size:.72rem;color:#f1c40f;letter-spacing:1px;display:none}
.thinking-label.show{display:block}

/* ── Buttons ── */
.controls{display:flex;gap:7px;flex-wrap:wrap}
button{padding:8px 14px;border:1px solid #2e3244;border-radius:5px;background:#1c1f2e;color:#ccc;font-size:.79rem;cursor:pointer;transition:background .15s,border-color .15s,transform .1s;white-space:nowrap}
button:hover{background:#252840;border-color:#f0c060;color:#fff}
button:active{transform:scale(.97)}
button:disabled{opacity:.4;cursor:not-allowed;transform:none}
button.warn{border-color:#7a2020;color:#e05050}
button.warn:hover{background:#2a1010;border-color:#e05050}
#btn-analyze{background:linear-gradient(135deg,#1e4a1e,#162e16);border-color:#3a8a3a;color:#7eff7e;font-weight:600;padding:9px 18px}
#btn-analyze:hover{background:linear-gradient(135deg,#2a622a,#1e4a1e);border-color:#5aba5a}
#btn-analyze.thinking{background:linear-gradient(135deg,#5a4a10,#3a3008);border-color:#c0a020;color:#ffd050;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #c0a02044}50%{box-shadow:0 0 0 6px #c0a02000}}

/* ── Sidebar ── */
.sidebar{flex:1;min-width:230px;max-width:300px;display:flex;flex-direction:column;gap:13px}
.card{background:#161926;border:1px solid #252840;border-radius:8px;padding:13px 15px}
.card h2{font-size:.67rem;text-transform:uppercase;letter-spacing:2.5px;color:#f0c060;margin-bottom:11px}

/* ── Engine status ── */
.engine-row{display:flex;align-items:center;gap:8px;font-size:.78rem;color:#777}
#engine-dot{width:9px;height:9px;border-radius:50%;background:#c0392b;flex-shrink:0;transition:background .4s}
#engine-dot.ready{background:#2ecc71;box-shadow:0 0 6px #2ecc7188}
#engine-dot.thinking{background:#f1c40f;box-shadow:0 0 6px #f1c40f88;animation:blink .7s steps(1) infinite}
@keyframes blink{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}

/* ── ELO STRENGTH PANEL ── */
.elo-display{display:flex;align-items:baseline;gap:6px;margin-bottom:10px}
.elo-number{font-size:2rem;font-weight:800;color:#f0c060;line-height:1;font-variant-numeric:tabular-nums}
.elo-label{font-size:.72rem;color:#666;text-transform:uppercase;letter-spacing:1px}
.elo-tier-badge{
  display:inline-block;padding:3px 9px;border-radius:12px;
  font-size:.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  margin-bottom:10px;
}

/* Slider */
.elo-slider-wrap{position:relative;margin-bottom:12px}
#elo-slider{
  -webkit-appearance:none;appearance:none;
  width:100%;height:6px;border-radius:3px;outline:none;cursor:pointer;
  background:linear-gradient(90deg,#2ecc71 0%,#f1c40f 40%,#e67e22 70%,#e74c3c 100%);
}
#elo-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:18px;height:18px;border-radius:50%;
  background:#f0c060;border:2px solid #0f1117;
  box-shadow:0 0 8px #f0c06088;cursor:grab;
  transition:transform .1s;
}
#elo-slider::-webkit-slider-thumb:active{transform:scale(1.2);cursor:grabbing}
#elo-slider::-moz-range-thumb{
  width:18px;height:18px;border-radius:50%;
  background:#f0c060;border:2px solid #0f1117;
  box-shadow:0 0 8px #f0c06088;cursor:grab;
}

/* Preset ELO buttons */
.elo-presets{display:flex;gap:5px;flex-wrap:wrap}
.elo-btn{
  padding:4px 9px;font-size:.68rem;border-radius:4px;
  border:1px solid #2e3244;background:#1c1f2e;color:#aaa;
  cursor:pointer;transition:all .15s;
}
.elo-btn:hover{border-color:#f0c060;color:#f0c060;background:#1e2240}
.elo-btn.active{border-color:#f0c060;color:#0f1117;background:#f0c060;font-weight:700}

/* ELO tier colors */
.tier-beginner   {background:#3a5a3a;color:#7eff7e;border:1px solid #2ecc71}
.tier-casual     {background:#3a4a2a;color:#b0e060;border:1px solid #8bc34a}
.tier-club       {background:#4a4a1a;color:#f0d060;border:1px solid #f0c060}
.tier-advanced   {background:#5a3a1a;color:#f0a040;border:1px solid #e67e22}
.tier-expert     {background:#5a2a2a;color:#f07060;border:1px solid #e74c3c}
.tier-master     {background:#4a2a5a;color:#c080f0;border:1px solid #9b59b6}
.tier-grandmaster{background:#2a2a5a;color:#80c0f0;border:1px solid #3498db}

/* ── Eval bar ── */
.eval-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
#eval-track{flex:1;height:13px;background:#0d0f17;border-radius:7px;overflow:hidden;position:relative;border:1px solid #252840}
#eval-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#c8c8c8,#fff);border-radius:7px;transition:width .35s ease;width:50%}
#eval-score{font-size:.95rem;font-weight:700;color:#f0c060;min-width:58px;text-align:right}
#eval-depth{font-size:.67rem;color:#444;margin-top:2px}

/* ── Best moves ── */
.move-entry{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid #202336}
.move-entry:last-child{border-bottom:none}
.move-glyph{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.g-best  {background:#2ecc71;box-shadow:0 0 7px #2ecc7188}
.g-second{background:#f1c40f;box-shadow:0 0 7px #f1c40f88}
.move-rank{font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:#444;min-width:32px}
.move-san{font-size:.9rem;flex:1;color:#e8eaf6;font-weight:600}
.move-cp{font-size:.74rem;color:#f0c060}

/* ── Move quality badge ── */
.quality-badge{
  display:inline-block;padding:2px 7px;border-radius:10px;
  font-size:.62rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  margin-left:2px;
}
.q-brilliant  {background:#00bcd4;color:#001820}
.q-best       {background:#2ecc71;color:#001a0a}
.q-good       {background:#8bc34a;color:#0a1a00}
.q-book       {background:#9b59b6;color:#1a0a2a}
.q-inaccuracy {background:#f0c060;color:#1a1000}
.q-mistake    {background:#e67e22;color:#1a0800}
.q-blunder    {background:#e74c3c;color:#1a0000}
.q-miss       {background:#c0392b;color:#1a0000}

/* ── Move quality explanation ── */
.quality-explain{
  font-size:.7rem;color:#666;margin-top:6px;
  padding:6px 8px;background:#0d0f17;border-radius:4px;
  border-left:3px solid #333;line-height:1.5;
  display:none;
}
.quality-explain.show{display:block}

/* ── Last move quality panel ── */
#last-move-quality{margin-top:6px}

/* ── Move history ── */
#history{max-height:190px;overflow-y:auto;display:flex;flex-direction:column;gap:1px;scrollbar-width:thin;scrollbar-color:#333 transparent}
.mpair{display:flex;gap:4px;font-size:.78rem;padding:3px 4px;border-radius:3px;align-items:center}
.mpair:hover{background:#1e2133}
.mn{color:#444;min-width:24px}
.mw{color:#ddd;min-width:46px}
.mb{color:#8a90aa;flex:1}
.mq{font-size:.58rem;padding:1px 5px;border-radius:8px;font-weight:700;margin-left:2px}
</style>
</head>
<body>

<div class="app-header">
  <h1>&#9820; CHESS ANALYZER</h1>
  <p>Stockfish Engine &middot; ELO Strength &middot; Move Quality</p>
</div>

<div class="layout">

  <!-- ═══ BOARD COLUMN ═══ -->
  <div class="board-col">
    <div id="board-wrap">
      <div id="board"></div>
      <canvas id="arrow-canvas"></canvas>
    </div>
    <div class="status-row">
      <span>Turn: <strong id="turn-text">White</strong></span>
      <span class="thinking-label" id="thinking-label">&#9881; Analyzing&hellip;</span>
    </div>
    <div class="controls">
      <button id="btn-analyze">&#128269; Analyze</button>
      <button id="btn-undo">&#8617; Undo</button>
      <button id="btn-reset" class="warn">&#8635; Reset</button>
      <button id="btn-flip">&#8661; Flip</button>
    </div>
  </div>

  <!-- ═══ SIDEBAR ═══ -->
  <div class="sidebar">

    <!-- Engine status -->
    <div class="card">
      <h2>Engine</h2>
      <div class="engine-row"><div id="engine-dot"></div><span id="engine-text">Loading Stockfish&hellip;</span></div>
    </div>

    <!-- ★ ELO STRENGTH PANEL -->
    <div class="card">
      <h2>&#9733; Analyzer Strength</h2>

      <div class="elo-display">
        <div class="elo-number" id="elo-display-num">1500</div>
        <div class="elo-label">ELO</div>
      </div>

      <div class="elo-tier-badge tier-club" id="elo-tier-badge">Club Player</div>

      <!-- Continuous slider: 400–3200 -->
      <div class="elo-slider-wrap" style="margin-top:10px">
        <input type="range" id="elo-slider" min="400" max="3200" step="50" value="1500"/>
      </div>

      <!-- Quick-pick presets -->
      <div class="elo-presets">
        <button class="elo-btn" data-elo="400">400</button>
        <button class="elo-btn" data-elo="800">800</button>
        <button class="elo-btn" data-elo="1200">1200</button>
        <button class="elo-btn active" data-elo="1500">1500</button>
        <button class="elo-btn" data-elo="2000">2000</button>
        <button class="elo-btn" data-elo="2500">2500</button>
        <button class="elo-btn" data-elo="3200">MAX</button>
      </div>

      <div style="font-size:.65rem;color:#444;margin-top:8px;line-height:1.5">
        Lower ELO = shallower search + intentional errors to match skill level.
      </div>
    </div>

    <!-- Evaluation -->
    <div class="card">
      <h2>Evaluation</h2>
      <div class="eval-row">
        <div id="eval-track"><div id="eval-fill"></div></div>
        <div id="eval-score">0.00</div>
      </div>
      <div id="eval-depth">&mdash;</div>
    </div>

    <!-- Best Moves -->
    <div class="card">
      <h2>Best Moves</h2>
      <div class="move-entry">
        <div class="move-glyph g-best"></div>
        <div class="move-rank">Best</div>
        <div class="move-san" id="best-san">&mdash;</div>
        <div class="move-cp" id="best-score"></div>
      </div>
      <div class="move-entry">
        <div class="move-glyph g-second"></div>
        <div class="move-rank">2nd</div>
        <div class="move-san" id="second-san">&mdash;</div>
        <div class="move-cp" id="second-score"></div>
      </div>

      <!-- Last move quality -->
      <div id="last-move-quality"></div>
    </div>

    <!-- Move History -->
    <div class="card">
      <h2>Move History</h2>
      <div id="history"></div>
    </div>

  </div><!-- /sidebar -->
</div><!-- /layout -->

<!-- ════════════ SCRIPTS ════════════ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

function pieceThemeFn(piece) {
  var svg = PIECES[piece];
  return svg ? 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg) : '';
}

/* ── 2. ELO STRENGTH SYSTEM ──────────────────────────────────────
   Maps ELO 400–3200 to:
   • Stockfish Skill Level 0–20
   • Search depth 1–18
   • Move time cap 300–2500ms
   ────────────────────────────────────────────────────────────── */
var ELO_TIERS = [
  { max:  600, label:'Beginner',    cls:'tier-beginner',    emoji:'🌱' },
  { max:  900, label:'Casual',      cls:'tier-casual',      emoji:'♟' },
  { max: 1200, label:'Club Player', cls:'tier-club',        emoji:'⚔' },
  { max: 1600, label:'Advanced',    cls:'tier-advanced',    emoji:'🏆' },
  { max: 2000, label:'Expert',      cls:'tier-expert',      emoji:'💡' },
  { max: 2400, label:'Master',      cls:'tier-master',      emoji:'👑' },
  { max: 9999, label:'Grandmaster', cls:'tier-grandmaster', emoji:'⭐' }
];

function eloToSkillLevel(elo) {
  /* Stockfish Skill Level 0 (weakest) to 20 (strongest).
     We use a curved mapping so low ELOs feel distinctly weaker. */
  var pct = Math.max(0, Math.min(1, (elo - 400) / (3200 - 400)));
  return Math.round(pct * pct * 20);   // quadratic curve
}

function eloToDepth(elo) {
  /* Depth 1 at ELO 400 → depth 18 at ELO 3200 */
  var pct = Math.max(0, Math.min(1, (elo - 400) / (3200 - 400)));
  return Math.max(1, Math.round(1 + pct * 17));
}

function eloToMoveTime(elo) {
  /* 300ms at ELO 400 → 2500ms at ELO 3200 */
  var pct = Math.max(0, Math.min(1, (elo - 400) / (3200 - 400)));
  return Math.round(300 + pct * 2200);
}

function getTier(elo) {
  for (var i = 0; i < ELO_TIERS.length; i++) {
    if (elo <= ELO_TIERS[i].max) return ELO_TIERS[i];
  }
  return ELO_TIERS[ELO_TIERS.length - 1];
}

var currentElo = 1500;

function applyElo(elo) {
  currentElo = elo;
  var skill = eloToSkillLevel(elo);
  var tier  = getTier(elo);

  /* Update slider */
  document.getElementById('elo-slider').value = elo;

  /* Update number display */
  document.getElementById('elo-display-num').textContent = elo;

  /* Update tier badge */
  var badge = document.getElementById('elo-tier-badge');
  badge.textContent = tier.emoji + ' ' + tier.label;
  badge.className   = 'elo-tier-badge ' + tier.cls;

  /* Update active preset button */
  var btns = document.querySelectorAll('.elo-btn');
  for (var i = 0; i < btns.length; i++) {
    var bElo = parseInt(btns[i].dataset.elo) || (btns[i].dataset.elo === 'MAX' ? 3200 : 0);
    btns[i].classList.toggle('active', bElo === elo);
  }

  /* Push new Skill Level to Stockfish immediately */
  sfSend('setoption name Skill Level value ' + skill);

  /* Update engine-text if ready */
  if (sfReady && !isThinking) {
    document.getElementById('engine-text').textContent =
      'Stockfish ready (Skill ' + skill + ')';
  }
}

/* ── 3. MOVE QUALITY CLASSIFICATION ─────────────────────────────
   After a player move, we compare their move's eval vs the engine's
   best eval BEFORE the move. The centipawn loss determines the label.

   Thresholds (cp loss from best):
   Brilliant  = played move leads to sacrifice + best available  ( ≤ 0 & special)
   Best       = within 0–10 cp of best
   Good       = 11–25 cp loss
   Inaccuracy = 26–60 cp loss
   Mistake    = 61–120 cp loss
   Blunder    = > 120 cp loss
   ────────────────────────────────────────────────────────────── */
var QUALITY = {
  brilliant : { label:'!! Brilliant', cls:'q-brilliant',  emoji:'💎', desc:'A spectacular and unexpected move — the absolute best in this position!' },
  best      : { label:'✓ Best',       cls:'q-best',       emoji:'✅', desc:'The engine\'s top choice. Perfect play.' },
  good      : { label:'+ Good',       cls:'q-good',       emoji:'👍', desc:'A solid move with minimal centipawn loss.' },
  inaccuracy: { label:'?! Inaccuracy',cls:'q-inaccuracy', emoji:'😬', desc:'A slightly inferior move. A better option was available.' },
  mistake   : { label:'? Mistake',    cls:'q-mistake',    emoji:'⚠️', desc:'A significant error that gives the opponent an advantage.' },
  blunder   : { label:'?? Blunder',   cls:'q-blunder',    emoji:'❌', desc:'A serious mistake that may decide the game.' }
};

function classifyMove(cpLoss, wasCapture) {
  /* cpLoss is always >= 0 (loss from best, in centipawns) */
  if (cpLoss <= 10)  return cpLoss <= 0 ? 'brilliant' : 'best';
  if (cpLoss <= 25)  return 'good';
  if (cpLoss <= 60)  return 'inaccuracy';
  if (cpLoss <= 120) return 'mistake';
  return 'blunder';
}

/* History of move quality labels for history panel */
var moveQualities = [];

/* ── 4. GAME STATE ── */
var game = new Chess();

/* ── 5. CANVAS / ARROWS ── */
var canvas = document.getElementById('arrow-canvas');
var ctx    = canvas.getContext('2d');
var boardFlipped = false;

function syncCanvas() {
  var w = document.getElementById('board-wrap');
  canvas.width  = w.offsetWidth;
  canvas.height = w.offsetHeight;
}

function clearArrows() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

function squarePx(name) {
  var file = name.charCodeAt(0) - 97;
  var rank = parseInt(name[1]) - 1;
  var sq   = canvas.width / 8;
  var col  = boardFlipped ? 7 - file : file;
  var row  = boardFlipped ? rank     : 7 - rank;
  return { x: col * sq + sq / 2, y: row * sq + sq / 2 };
}

function drawArrow(from, to, color) {
  var s = squarePx(from), e = squarePx(to);
  var sq = canvas.width / 8;
  var hl = sq * 0.44, lw = sq * 0.12;
  var angle = Math.atan2(e.y - s.y, e.x - s.x);
  var tx = e.x - hl * 0.38 * Math.cos(angle);
  var ty = e.y - hl * 0.38 * Math.sin(angle);
  ctx.save();
  ctx.globalAlpha = 0.88;
  ctx.strokeStyle = ctx.fillStyle = color;
  ctx.lineWidth   = lw;
  ctx.lineCap     = 'round';
  ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(tx,ty); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(e.x,e.y);
  ctx.lineTo(e.x-hl*Math.cos(angle-Math.PI/6), e.y-hl*Math.sin(angle-Math.PI/6));
  ctx.lineTo(e.x-hl*Math.cos(angle+Math.PI/6), e.y-hl*Math.sin(angle+Math.PI/6));
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawBestArrows() {
  clearArrows();
  if (pvLines[2]) drawArrow(pvLines[2].move.slice(0,2), pvLines[2].move.slice(2,4), '#f1c40f');
  if (pvLines[1]) drawArrow(pvLines[1].move.slice(0,2), pvLines[1].move.slice(2,4), '#2ecc71');
}

/* ── 6. STOCKFISH BLOB WORKER ────────────────────────────────────
   Blob Worker avoids CORS when opened as file://
   ────────────────────────────────────────────────────────────── */
var SF_CDN  = 'https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js';
var sfBlob  = new Blob([
  "importScripts('" + SF_CDN + "');" +
  "var sf=STOCKFISH();" +
  "sf.onmessage=function(m){postMessage(m);};" +
  "onmessage=function(e){sf.postMessage(e.data);};"
], { type:'application/javascript' });

var stockfish  = new Worker(URL.createObjectURL(sfBlob));
var sfReady    = false;
var pvLines    = {};
var isThinking = false;

/* For move quality: store eval BEFORE a move is played, then compare AFTER */
var evalBeforeMove = null;   // centipawns (White's POV) before last player move
var lastPlayerMove = null;   // the move object from chess.js

function sfSend(cmd) { stockfish.postMessage(cmd); }

sfSend('uci');
sfSend('setoption name MultiPV value 2');
sfSend('setoption name Hash value 32');
sfSend('setoption name Skill Level value ' + eloToSkillLevel(currentElo));
sfSend('isready');

/* ── 7. STOCKFISH OUTPUT HANDLER ── */
stockfish.onmessage = function(evt) {
  var line = (typeof evt === 'string') ? evt : evt.data;
  if (!line) return;

  if (line === 'readyok') {
    sfReady = true;
    setEngineStatus('ready', 'Stockfish ready (Skill ' + eloToSkillLevel(currentElo) + ')');
    analyzePosition();
    return;
  }

  if (line.indexOf('info') === 0 && line.indexOf(' pv ') !== -1) {
    var dM   = line.match(/\bdepth (\d+)/);
    var mpvM = line.match(/\bmultipv (\d+)/);
    var cpM  = line.match(/\bscore cp (-?\d+)/);
    var matM = line.match(/\bscore mate (-?\d+)/);
    var pvM  = line.match(/\bpv ([a-h][1-8][a-h][1-8][qrbn]?)/);
    if (!pvM) return;

    var depth  = dM   ? parseInt(dM[1])   : 0;
    var mpv    = mpvM ? parseInt(mpvM[1]) : 1;
    var move   = pvM[1];
    var cp = 0, isMate = false;
    if (matM) { cp = parseInt(matM[1]); isMate = true; }
    else if (cpM) { cp = parseInt(cpM[1]); }
    if (game.turn() === 'b') cp = -cp;

    pvLines[mpv] = { move:move, cp:cp, isMate:isMate, depth:depth };
    if (mpv === 1) updateEvalUI(cp, isMate, depth);
  }

  if (line.indexOf('bestmove') === 0) {
    isThinking = false;
    setThinkingUI(false);
    renderResults();

    /* ── Compute move quality after engine finishes ──
       evalBeforeMove = best cp score BEFORE the player moved.
       pvLines[1].cp  = best cp score AFTER the player moved (engine's new eval).
       cpLoss = how much worse the position got (from the player's POV). */
    if (evalBeforeMove !== null && lastPlayerMove !== null && pvLines[1]) {
      /* The eval after the move is from the OPPONENT's turn perspective,
         so from the player's perspective it's negated vs evalBeforeMove.
         Simpler: evalBefore was White's POV; after the move it's still White's POV. */
      var evalAfter = pvLines[1].cp;    // White POV after opponent-to-move
      /* The player who just moved: if they were White, good for them = high White cp.
         cpLoss = how much the position worsened FOR the mover. */
      var movedAsWhite = (lastPlayerMove.color === 'w');
      var cpBefore = movedAsWhite ?  evalBeforeMove : -evalBeforeMove;
      var cpAfter  = movedAsWhite ?  evalAfter      : -evalAfter;
      /* Note: after moving it's opponent's turn, so engine's best cp is now negative
         relative to the player who just moved. cpAfter represents what the mover left. */
      var cpLoss = Math.max(0, cpBefore - cpAfter);

      var quality  = classifyMove(cpLoss);
      var qualDef  = QUALITY[quality];

      /* Store for history */
      moveQualities.push({ quality:quality, san:lastPlayerMove.san });

      /* Show quality panel */
      renderMoveQuality(qualDef, cpLoss, lastPlayerMove.san);

      evalBeforeMove = null;
      lastPlayerMove  = null;
    }
  }
};

/* ── 8. ANALYZE POSITION ── */
function analyzePosition() {
  if (!sfReady) return;
  if (game.game_over()) { setEngineStatus('ready','Game over'); return; }

  pvLines    = {};
  isThinking = true;
  setThinkingUI(true);
  clearArrows();

  document.getElementById('best-san').textContent    = '\u2026';
  document.getElementById('second-san').textContent  = '\u2026';
  document.getElementById('best-score').textContent  = '';
  document.getElementById('second-score').textContent = '';

  var skill = eloToSkillLevel(currentElo);
  var depth = eloToDepth(currentElo);
  var mtime = eloToMoveTime(currentElo);

  sfSend('stop');
  sfSend('setoption name Skill Level value ' + skill);
  sfSend('position fen ' + game.fen());
  sfSend('go depth ' + depth + ' movetime ' + mtime);
}

/* ── 9. UI HELPERS ── */
function fmtScore(cp, isMate) {
  if (isMate) return '#' + cp;
  return (cp >= 0 ? '+' : '') + (cp / 100).toFixed(2);
}

function updateEvalUI(cp, isMate, depth) {
  var score = isMate ? (cp > 0 ? 10000 : -10000) : cp;
  var pct   = Math.min(95, Math.max(5, 50 + score / 16));
  document.getElementById('eval-fill').style.width  = pct + '%';
  document.getElementById('eval-score').textContent = fmtScore(cp, isMate);
  document.getElementById('eval-depth').textContent = depth ?
    'depth ' + depth + ' · ELO ' + currentElo + ' · Skill ' + eloToSkillLevel(currentElo) : '\u2014';
}

function uciToSan(uci) {
  var c  = new Chess(game.fen());
  var mv = c.move({ from:uci.slice(0,2), to:uci.slice(2,4), promotion:uci[4]||'q' });
  return mv ? mv.san : uci;
}

function renderResults() {
  drawBestArrows();
  var b = pvLines[1], s = pvLines[2];
  document.getElementById('best-san').textContent    = b ? uciToSan(b.move) : '\u2014';
  document.getElementById('best-score').textContent  = b ? fmtScore(b.cp, b.isMate) : '';
  document.getElementById('second-san').textContent  = s ? uciToSan(s.move) : '\u2014';
  document.getElementById('second-score').textContent = s ? fmtScore(s.cp, s.isMate) : '';
}

function renderMoveQuality(qualDef, cpLoss, san) {
  var el = document.getElementById('last-move-quality');
  var lossStr = cpLoss > 0 ? ' (−' + (cpLoss/100).toFixed(2) + ' cp)' : '';
  el.innerHTML =
    '<div style="margin-top:10px;padding-top:10px;border-top:1px solid #202336">' +
    '<div style="font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:#555;margin-bottom:6px">Last Move</div>' +
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
    '<span style="font-size:.95rem;font-weight:700;color:#eee">' + san + '</span>' +
    '<span class="quality-badge ' + qualDef.cls + '">' + qualDef.label + '</span>' +
    '</div>' +
    '<div style="font-size:.7rem;color:#666;background:#0d0f17;padding:6px 8px;border-radius:4px;border-left:3px solid #333;line-height:1.5">' +
    qualDef.emoji + ' ' + qualDef.desc + (cpLoss > 0 ? '<br><span style="color:#555">CP loss: ' + (cpLoss/100).toFixed(2) + '</span>' : '') +
    '</div></div>';
}

function setEngineStatus(state, text) {
  document.getElementById('engine-dot').className = state;
  document.getElementById('engine-text').textContent = text;
}

function setThinkingUI(on) {
  var btn = document.getElementById('btn-analyze');
  var lbl = document.getElementById('thinking-label');
  var dot = document.getElementById('engine-dot');
  if (on) {
    btn.textContent = '\u2699 Thinking\u2026';
    btn.classList.add('thinking'); btn.disabled = true;
    lbl.classList.add('show'); dot.className = 'thinking';
    document.getElementById('engine-text').textContent = 'Analyzing\u2026';
  } else {
    btn.textContent = '\uD83D\uDD0D Analyze';
    btn.classList.remove('thinking'); btn.disabled = false;
    lbl.classList.remove('show'); dot.className = 'ready';
    document.getElementById('engine-text').textContent =
      'Stockfish ready (Skill ' + eloToSkillLevel(currentElo) + ')';
  }
}

function updateTurn() {
  document.getElementById('turn-text').textContent = game.turn() === 'w' ? 'White' : 'Black';
}

function renderHistory() {
  var moves = game.history();
  var el    = document.getElementById('history');
  el.innerHTML = '';
  for (var i = 0; i < moves.length; i += 2) {
    var d  = document.createElement('div');
    d.className = 'mpair';

    /* Attach quality badge if available */
    var qw = moveQualities[i],   qb = moveQualities[i+1];
    var qwBadge = qw ? '<span class="mq quality-badge ' + QUALITY[qw.quality].cls + '">' +
                       QUALITY[qw.quality].label.split(' ')[0] + '</span>' : '';
    var qbBadge = qb ? '<span class="mq quality-badge ' + QUALITY[qb.quality].cls + '">' +
                       QUALITY[qb.quality].label.split(' ')[0] + '</span>' : '';

    d.innerHTML = '<span class="mn">' + (Math.floor(i/2)+1) + '.</span>' +
                  '<span class="mw">' + moves[i] + qwBadge + '</span>' +
                  '<span class="mb">' + (moves[i+1]||'') + qbBadge + '</span>';
    el.appendChild(d);
  }
  el.scrollTop = el.scrollHeight;
}

function refreshUI() { updateTurn(); renderHistory(); }

/* ── 10. CHESSBOARD.JS ── */
var cboard = Chessboard('board', {
  draggable:  true,
  position:  'start',
  pieceTheme: pieceThemeFn,

  onDragStart: function(source, piece) {
    if (game.game_over() || isThinking) return false;
    if (game.turn() === 'w' && piece.charAt(0) === 'b') return false;
    if (game.turn() === 'b' && piece.charAt(0) === 'w') return false;
  },

  onDrop: function(source, target) {
    clearArrows();

    /* Capture eval BEFORE the move for quality comparison */
    evalBeforeMove = pvLines[1] ? pvLines[1].cp : null;

    var move = game.move({ from:source, to:target, promotion:'q' });
    if (!move) { evalBeforeMove = null; return 'snapback'; }

    lastPlayerMove = move;
    refreshUI();
    analyzePosition();
  },

  onSnapEnd: function() { cboard.position(game.fen()); }
});

syncCanvas();
window.addEventListener('resize', function() {
  cboard.resize(); syncCanvas(); clearArrows();
  if (pvLines[1] || pvLines[2]) drawBestArrows();
});

/* ── 11. ELO CONTROLS ── */
document.getElementById('elo-slider').addEventListener('input', function() {
  var v = parseInt(this.value);
  applyElo(v);
});

document.querySelectorAll('.elo-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var v = this.dataset.elo === 'MAX' ? 3200 : parseInt(this.dataset.elo);
    applyElo(v);
  });
});

/* ── 12. BUTTON HANDLERS ── */
document.getElementById('btn-analyze').addEventListener('click', function() {
  if (!sfReady || isThinking) return;
  analyzePosition();
});

document.getElementById('btn-undo').addEventListener('click', function() {
  sfSend('stop'); isThinking = false; setThinkingUI(false);
  game.undo();
  if (moveQualities.length) moveQualities.pop();
  cboard.position(game.fen()); clearArrows(); pvLines = {};
  document.getElementById('best-san').textContent    = '\u2014';
  document.getElementById('second-san').textContent  = '\u2014';
  document.getElementById('best-score').textContent   = '';
  document.getElementById('second-score').textContent  = '';
  document.getElementById('last-move-quality').innerHTML = '';
  evalBeforeMove = null; lastPlayerMove = null;
  refreshUI();
});

document.getElementById('btn-reset').addEventListener('click', function() {
  sfSend('stop'); isThinking = false; setThinkingUI(false);
  game.reset(); cboard.start(); clearArrows(); pvLines = {}; moveQualities = [];
  document.getElementById('best-san').textContent    = '\u2014';
  document.getElementById('second-san').textContent  = '\u2014';
  document.getElementById('best-score').textContent   = '';
  document.getElementById('second-score').textContent  = '';
  document.getElementById('eval-score').textContent   = '0.00';
  document.getElementById('eval-fill').style.width    = '50%';
  document.getElementById('eval-depth').textContent   = '\u2014';
  document.getElementById('last-move-quality').innerHTML = '';
  evalBeforeMove = null; lastPlayerMove = null;
  refreshUI();
  analyzePosition();
});

document.getElementById('btn-flip').addEventListener('click', function() {
  boardFlipped = !boardFlipped;
  cboard.flip();
  if (pvLines[1] || pvLines[2]) drawBestArrows();
});

/* ── 13. INIT ── */
applyElo(1500); /* set default display */
</script>
</body>
</html>
